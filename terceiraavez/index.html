<html>
 
	<head> 
		<meta name = "viewport" content = "width=device-width, initial-scale=1.0"> 
		<title> Menu Responsivo </title>
		<style>
			 html, body
			{
			 margin: 0px; padding: 0; color: white; overflow: hidden;		  				

			}
			
			.menu-encapsulado
			{
			position:relative;
			height: 100vh;
			width: 20vw;
			}
			
		    .menu-container 
			{
			  background: gray;
			 
 		          width: 100%;
		        
			  height: 100%;
			}
			
			.menu-itens

			{
			  position: absolute;
		          left:5%;
			  top: 7%;
			  color: white;
			  font-size: 12px;
			  
			}
			

			.checkbox-escondido
			{
			display: inline;
			}
			

			.btn
			{
			position: absolute;
			top: 2%;
			left: 85%;
			color: white;
			
			}


			.checkbox-escondido
			{
			display:none;
			}
			
			.elemento-oculto
			{
			height: 100%;
			width: 20%;
			display:none;
			background: gray;
			}

			.checkbox-escondido:checked ~ .menu-container
			{
			display:none;
			}
			.checkbox-escondido:checked ~ .btn
			{
			left: 7%;
			}
			.checkbox-escondido:checked ~ .elemento-oculto
			{
			display:block;
			color:black;
			}
			.bar{width: 28px; height: 7px; background: white; border: 1px solid black;}

			@media only screen and (max-width: 600px)
			{
				.menu-encapsulado{width:100vw;}
				.elemento-oculto{height:7%;width: 100vw; }
				.checkbox-escondido:checked ~ .btn{left: 85%;}

			}
					
		 </style> 
	</head>

	<body>
		
		<nav class = "menu-encapsulado">
			<input type= "checkbox" id ="meu-trigger" class = "checkbox-escondido" >
			<label class = "btn" for = "meu-trigger"> 
				<div class = hamburguer-icon">  
					<div class = "bar"></div>
					<div class = "bar"></div>
					<div class = "bar"></div>
				</div>   
			</label>
			<div class = "menu-container"> 
				<div class = "menu-itens"> 
		  
			 		<a> INÍCIO </a> <br>
			  		<a> PRODUTOS </a> <br>
			  		<a> CONTATO </a> <br>
			  		<a> SOBRE </a> <br>
				</div>
			</div>
			<div class = "elemento-oculto"> </div>
		 </nav>
	</body> 
</html>
